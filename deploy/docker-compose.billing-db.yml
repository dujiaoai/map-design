# Optional override: billing-api 使用独立 PostgreSQL（与 saas-api 分库）。
#
#   docker compose -f deploy/docker-compose.yml -f deploy/docker-compose.billing-db.yml up -d
#
# 首次启动后 billing-db-sync 会从 saas 库复制 sys_user / sys_tenant_feature 镜像表。

services:
  postgres-billing:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: billing
      POSTGRES_USER: billing
      POSTGRES_PASSWORD: billing
    volumes:
      - billing_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U billing -d billing']
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  billing-api:
    environment:
      BILLING_DATASOURCE_URL: jdbc:postgresql://postgres-billing:5432/billing
      BILLING_DATASOURCE_USERNAME: billing
      BILLING_DATASOURCE_PASSWORD: billing
      BILLING_MEMBERSHIP_SYNC_ENABLED: ${BILLING_MEMBERSHIP_SYNC_ENABLED:-true}
      BILLING_SAAS_DATASOURCE_URL: jdbc:postgresql://postgres:5432/saas
      BILLING_SAAS_DATASOURCE_USERNAME: saas
      BILLING_SAAS_DATASOURCE_PASSWORD: saas
    depends_on:
      postgres:
        condition: service_healthy
      postgres-billing:
        condition: service_healthy

  billing-db-sync:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
      postgres-billing:
        condition: service_healthy
      billing-api:
        condition: service_started
      saas-api-seed:
        condition: service_completed_successfully
    volumes:
      - ../services/billing-api/scripts/sync-membership-mirror.sh:/sync.sh:ro
    entrypoint: ['/bin/sh', '/sync.sh']
    restart: 'no'

volumes:
  billing_pg_data:
