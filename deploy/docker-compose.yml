services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: saas
      POSTGRES_USER: saas
      POSTGRES_PASSWORD: saas
    volumes:
      - saas_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U saas -d saas']
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  saas-api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.saas-api
    image: map-design/saas-api:${TAG:-latest}
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SAAS_JWT_SECRET: ${SAAS_JWT_SECRET:-docker-only-change-me-use-32chars-min!!}
      SAAS_BILLING_ENABLED: ${SAAS_BILLING_ENABLED:-true}
      SAAS_BILLING_API_BASE_URL: ${SAAS_BILLING_API_BASE_URL:-http://billing-api:8083}
      BILLING_INTERNAL_TOKEN: ${BILLING_INTERNAL_TOKEN:-docker-billing-internal-token-change-me}
    ports:
      - '${SAAS_API_PORT:-8082}:8082'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  billing-api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.billing-api
    image: map-design/billing-api:${TAG:-latest}
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SAAS_JWT_SECRET: ${SAAS_JWT_SECRET:-docker-only-change-me-use-32chars-min!!}
      BILLING_INTERNAL_TOKEN: ${BILLING_INTERNAL_TOKEN:-docker-billing-internal-token-change-me}
      BILLING_WEBHOOK_TOKEN: ${BILLING_WEBHOOK_TOKEN:-docker-billing-webhook-token-change-me}
      BILLING_WEBHOOK_SIGNATURE_VERIFY_ENABLED: ${BILLING_WEBHOOK_SIGNATURE_VERIFY_ENABLED:-false}
      BILLING_WEBHOOK_WECHAT_SIGNATURE_MODE: ${BILLING_WEBHOOK_WECHAT_SIGNATURE_MODE:-hmac}
      BILLING_WEBHOOK_ALIPAY_SIGNATURE_MODE: ${BILLING_WEBHOOK_ALIPAY_SIGNATURE_MODE:-hmac}
      BILLING_WEBHOOK_WECHAT_SIGN_SECRET: ${BILLING_WEBHOOK_WECHAT_SIGN_SECRET:-}
      BILLING_WEBHOOK_ALIPAY_SIGN_SECRET: ${BILLING_WEBHOOK_ALIPAY_SIGN_SECRET:-}
      BILLING_WEBHOOK_WECHAT_PLATFORM_PUBLIC_KEY_PEM: ${BILLING_WEBHOOK_WECHAT_PLATFORM_PUBLIC_KEY_PEM:-}
      BILLING_WEBHOOK_ALIPAY_PUBLIC_KEY_PEM: ${BILLING_WEBHOOK_ALIPAY_PUBLIC_KEY_PEM:-}
      BILLING_MOCK_PAYMENT: ${BILLING_MOCK_PAYMENT:-true}
      BILLING_RATE_LIMIT_ENABLED: ${BILLING_RATE_LIMIT_ENABLED:-true}
      BILLING_LOW_BALANCE_ENABLED: ${BILLING_LOW_BALANCE_ENABLED:-true}
      BILLING_LOW_BALANCE_THRESHOLD: ${BILLING_LOW_BALANCE_THRESHOLD:-50}
      BILLING_TENANT_RLS_ENABLED: ${BILLING_TENANT_RLS_ENABLED:-true}
    ports:
      - '${BILLING_API_PORT:-8085}:8083'
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  saas-api-seed:
    image: postgres:16-alpine
    depends_on:
      saas-api:
        condition: service_healthy
    environment:
      PGPASSWORD: saas
    volumes:
      - ../services/saas-api/scripts/seed-demo-dev.sql:/seed.sql:ro
    entrypoint: ['/bin/sh', '-c', 'psql -h postgres -U saas -d saas -f /seed.sql']
    restart: 'no'

  saas-web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.saas-web
      args:
        BUILD_MODE: ${BUILD_MODE:-production}
    image: map-design/saas-web:${TAG:-latest}
    ports:
      - '${SAAS_WEB_PORT:-8084}:80'
    environment:
      RUOYI_API_UPSTREAM: ${RUOYI_API_UPSTREAM:-https://www.airace.com.cn}
      SAAS_API_UPSTREAM: http://saas-api:8082
      BILLING_API_UPSTREAM: http://billing-api:8083
    depends_on:
      saas-api:
        condition: service_healthy
      billing-api:
        condition: service_started
    restart: unless-stopped

  saas-admin:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.saas-admin
    image: map-design/saas-admin:${TAG:-latest}
    ports:
      - '${SAAS_ADMIN_PORT:-8083}:80'
    environment:
      SAAS_API_UPSTREAM: http://saas-api:8082
      BILLING_API_UPSTREAM: http://billing-api:8083
    depends_on:
      saas-api:
        condition: service_healthy
      billing-api:
        condition: service_started
    restart: unless-stopped

  cloud-uav:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.cloud-uav
    image: map-design/cloud-uav:${TAG:-latest}
    ports:
      - '${CLOUD_UAV_PORT:-8081}:80'
    restart: unless-stopped

  gateway:
    profiles: [gateway]
    image: nginx:1.27-alpine
    ports:
      - '${GATEWAY_PORT:-9080}:80'
    volumes:
      - ./nginx/gateway.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - saas-web
      - saas-admin
      - cloud-uav
    restart: unless-stopped

volumes:
  saas_pg_data:
