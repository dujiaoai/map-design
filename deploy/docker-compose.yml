services:
  saas-web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.saas-web
      args:
        BUILD_MODE: ${BUILD_MODE:-production}
    image: map-design/saas-web:${TAG:-latest}
    ports:
      - "${SAAS_WEB_PORT:-8080}:80"
    environment:
      RUOYI_API_UPSTREAM: ${RUOYI_API_UPSTREAM:-https://www.airace.com.cn}
    restart: unless-stopped

  cloud-uav:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.cloud-uav
    image: map-design/cloud-uav:${TAG:-latest}
    ports:
      - "${CLOUD_UAV_PORT:-8081}:80"
    restart: unless-stopped

  gateway:
    profiles: [gateway]
    image: nginx:1.27-alpine
    ports:
      - "${GATEWAY_PORT:-9080}:80"
    volumes:
      - ./nginx/gateway.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - saas-web
      - cloud-uav
    restart: unless-stopped
