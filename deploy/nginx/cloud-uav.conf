server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;

    # 带 hash 的分块资源：长缓存
    location ~ ^/yunyan-cloud-uav/assets/.+\-[a-f0-9]+\.(js|css)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # 无 hash 的入口 ESM：短缓存
    location ~ ^/yunyan-cloud-uav/assets/(registry|[a-z0-9-]+)\.js$ {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    location /yunyan-cloud-uav/ {
        try_files $uri =404;
    }
}
