# 可选：统一入口，模拟生产同域部署
# 启动：docker compose --profile gateway up -d

upstream saas_web {
    server saas-web:80;
}

upstream cloud_uav {
    server cloud-uav:80;
}

server {
    listen 80;
    server_name _;

    location /yunyan-cloud-uav/ {
        proxy_pass http://cloud_uav;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://saas_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
