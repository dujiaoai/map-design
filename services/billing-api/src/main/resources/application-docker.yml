spring:
  datasource:
    url: ${BILLING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/saas}
    username: ${BILLING_DATASOURCE_USERNAME:saas}
    password: ${BILLING_DATASOURCE_PASSWORD:saas}

server:
  port: 8083

# Docker compose 预发：与 saas-api 共用 JWT；内网 m2m token 由 compose 注入。
# Webhook 验签 / 限流 / 低余额阈值见 deploy/.env.docker.example 与 docs/runbooks/docker-deployment.md §4.3
billing:
  jwt:
    secret: ${SAAS_JWT_SECRET:docker-only-change-me-use-32chars-min!!}
  internal:
    token: ${BILLING_INTERNAL_TOKEN:docker-billing-internal-token-change-me}
    allowed-callers:
      - saas-api
  webhook:
    token: ${BILLING_WEBHOOK_TOKEN:docker-billing-webhook-token-change-me}
    signature-verify-enabled: ${BILLING_WEBHOOK_SIGNATURE_VERIFY_ENABLED:false}
    wechat-signature-mode: ${BILLING_WEBHOOK_WECHAT_SIGNATURE_MODE:hmac}
    alipay-signature-mode: ${BILLING_WEBHOOK_ALIPAY_SIGNATURE_MODE:hmac}
    wechat-sign-secret: ${BILLING_WEBHOOK_WECHAT_SIGN_SECRET:}
    alipay-sign-secret: ${BILLING_WEBHOOK_ALIPAY_SIGN_SECRET:}
    wechat-platform-public-key-pem: ${BILLING_WEBHOOK_WECHAT_PLATFORM_PUBLIC_KEY_PEM:}
    alipay-public-key-pem: ${BILLING_WEBHOOK_ALIPAY_PUBLIC_KEY_PEM:}
  payment:
    # 本地 compose 演示默认允许 mock-pay；生产务必 false
    mock-enabled: ${BILLING_MOCK_PAYMENT:true}
  rate-limit:
    enabled: ${BILLING_RATE_LIMIT_ENABLED:true}
  low-balance:
    enabled: ${BILLING_LOW_BALANCE_ENABLED:true}
    threshold: ${BILLING_LOW_BALANCE_THRESHOLD:50}
