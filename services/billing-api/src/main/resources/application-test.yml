spring:
  datasource:
    url: jdbc:h2:mem:billing_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  flyway:
    enabled: true
    locations: classpath:db/migration

billing:
  jwt:
    issuer: yunyan-saas-test
    secret: test-jwt-secret-with-at-least-32-bytes!!
    access-ttl: PT15M
  signup-bonus:
    personal: 500
    organization: 1000
  internal:
    token: test-billing-internal-token
  payment:
    mock-enabled: true
  recharge:
    order-ttl-minutes: 30
