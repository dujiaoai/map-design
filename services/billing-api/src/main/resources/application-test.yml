spring:
  datasource:
    url: jdbc:h2:mem:billing_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  flyway:
    enabled: true
    locations: classpath:db/migration
    table: flyway_schema_history_billing
  task:
    scheduling:
      enabled: false

billing:
  tenant-rls:
    enabled: false
  jwt:
    issuer: yunyan-saas-test
    secret: test-jwt-secret-with-at-least-32-bytes!!
    access-ttl: PT15M
    perm-epoch: 1
  signup-bonus:
    personal: 500
    organization: 1000
  internal:
    token: test-billing-internal-token
    allowed-callers: []
  webhook:
    token: test-billing-webhook-token
  payment:
    mock-enabled: true
  recharge:
    order-ttl-minutes: 30
  hold:
    ttl-minutes: 30
  rate-limit:
    enabled: false
  wire-transfer:
    platform-account:
      enabled: true
      account-name: 云眼地图测试收款户
      bank-name: 中国银行深圳分行
      account-no: "6222021234567890123"
      transfer-remark: 请在附言注明企业名称与申请单号
