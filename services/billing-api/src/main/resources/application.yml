spring:
  application:
    name: billing-api
  profiles:
    active: dev
  datasource:
    url: jdbc:postgresql://localhost:5432/saas
    username: saas
    password: saas
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8083

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

billing:
  jwt:
    issuer: yunyan-saas
    secret: ${SAAS_JWT_SECRET:dev-only-change-me-use-32chars-minimum!!}
    access-ttl: PT15M
    perm-epoch: ${SAAS_JWT_PERM_EPOCH:2}
  signup-bonus:
    personal: 500
    organization: 1000
  internal:
    token: ${BILLING_INTERNAL_TOKEN:dev-billing-internal-token-change-me}
  webhook:
    token: ${BILLING_WEBHOOK_TOKEN:dev-billing-webhook-token-change-me}
  payment:
    mock-enabled: ${BILLING_MOCK_PAYMENT:false}
  recharge:
    order-ttl-minutes: 30
  hold:
    ttl-minutes: 30
    expire-scan-ms: 300000

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    persist-authorization: true
    display-request-duration: true
    tags-sorter: alpha
    operations-sorter: method
    try-it-out-enabled: true
  show-actuator: false
  packages-to-scan: com.yunyan.billingapi.web.controller
