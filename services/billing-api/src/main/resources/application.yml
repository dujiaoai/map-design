spring:
  application:
    name: billing-api
  profiles:
    active: dev
  datasource:
    url: ${BILLING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/saas}
    username: ${BILLING_DATASOURCE_USERNAME:saas}
    password: ${BILLING_DATASOURCE_PASSWORD:saas}
  flyway:
    enabled: true
    locations: classpath:db/migration
    # 与 saas-api 共用 PG，但迁移版本独立（避免 V1/V2… 与 saas-api 冲突）
    table: flyway_schema_history_billing
    # public 已有 saas-api 表；首次启动时 baseline 再跑 billing 迁移
    baseline-on-migrate: true
    baseline-version: "0"

server:
  port: 8083

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

billing:
  jwt:
    issuer: yunyan-saas
    secret: ${SAAS_JWT_SECRET:dev-only-change-me-use-32chars-minimum!!}
    access-ttl: PT15M
    perm-epoch: ${SAAS_JWT_PERM_EPOCH:2}
  signup-bonus:
    personal: 500
    organization: 1000
  internal:
    token: ${BILLING_INTERNAL_TOKEN:dev-billing-internal-token-change-me}
    allowed-callers:
      - saas-api
  webhook:
    token: ${BILLING_WEBHOOK_TOKEN:dev-billing-webhook-token-change-me}
    signature-verify-enabled: ${BILLING_WEBHOOK_SIGNATURE_VERIFY_ENABLED:false}
    wechat-signature-mode: ${BILLING_WEBHOOK_WECHAT_SIGNATURE_MODE:hmac}
    alipay-signature-mode: ${BILLING_WEBHOOK_ALIPAY_SIGNATURE_MODE:hmac}
    wechat-sign-secret: ${BILLING_WEBHOOK_WECHAT_SIGN_SECRET:}
    alipay-sign-secret: ${BILLING_WEBHOOK_ALIPAY_SIGN_SECRET:}
    wechat-platform-public-key-pem: ${BILLING_WEBHOOK_WECHAT_PLATFORM_PUBLIC_KEY_PEM:}
    alipay-public-key-pem: ${BILLING_WEBHOOK_ALIPAY_PUBLIC_KEY_PEM:}
  payment:
    mock-enabled: ${BILLING_MOCK_PAYMENT:false}
    provider-mode: ${BILLING_PAYMENT_PROVIDER_MODE:stub}
    query-scan-enabled: ${BILLING_PAYMENT_QUERY_SCAN_ENABLED:false}
    query-scan-ms: ${BILLING_PAYMENT_QUERY_SCAN_MS:300000}
    wechat:
      app-id: ${BILLING_PAYMENT_WECHAT_APP_ID:}
      mch-id: ${BILLING_PAYMENT_WECHAT_MCH_ID:}
      api-v3-key: ${BILLING_PAYMENT_WECHAT_API_V3_KEY:}
      notify-url: ${BILLING_PAYMENT_WECHAT_NOTIFY_URL:}
      default-pay-scene: ${BILLING_PAYMENT_WECHAT_DEFAULT_PAY_SCENE:native}
    alipay:
      app-id: ${BILLING_PAYMENT_ALIPAY_APP_ID:}
      private-key-pem: ${BILLING_PAYMENT_ALIPAY_PRIVATE_KEY_PEM:}
      notify-url: ${BILLING_PAYMENT_ALIPAY_NOTIFY_URL:}
      default-pay-scene: ${BILLING_PAYMENT_ALIPAY_DEFAULT_PAY_SCENE:wap}
  recharge:
    order-ttl-minutes: 30
    expire-scan-ms: 300000
  hold:
    ttl-minutes: 30
    expire-scan-ms: 300000
    max-quantity: 10000
    max-points-per-hold: 1000000
    idempotency-key-max-length: 128
    biz-ref-max-length: 256
  refund:
    recovery-scan-ms: 300000
    stuck-minutes: 30
  low-balance:
    enabled: ${BILLING_LOW_BALANCE_ENABLED:true}
    threshold: ${BILLING_LOW_BALANCE_THRESHOLD:50}
  rate-limit:
    enabled: ${BILLING_RATE_LIMIT_ENABLED:true}
    webhook:
      ip-max-attempts: 120
      ip-window: PT1M
    admin:
      adjust-max-attempts: 30
      adjust-window: PT1H
      refund-max-attempts: 10
      refund-window: PT1H
  membership-sync:
    enabled: ${BILLING_MEMBERSHIP_SYNC_ENABLED:false}
    scan-ms: ${BILLING_MEMBERSHIP_SYNC_SCAN_MS:300000}
    saas:
      url: ${BILLING_SAAS_DATASOURCE_URL:}
      username: ${BILLING_SAAS_DATASOURCE_USERNAME:saas}
      password: ${BILLING_SAAS_DATASOURCE_PASSWORD:saas}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    persist-authorization: true
    display-request-duration: true
    tags-sorter: alpha
    operations-sorter: method
    try-it-out-enabled: true
  show-actuator: false
  packages-to-scan: com.yunyan.billingapi.web.controller
