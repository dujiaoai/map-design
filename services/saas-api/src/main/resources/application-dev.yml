# 本地开发：关闭认证限流，避免反复注册/登录调试触发 429
saas:
  rate-limit:
    enabled: false
  billing:
    enabled: true
    usage:
      enabled: ${SAAS_BILLING_USAGE_CLIENT_ENABLED:false}
  # OIDC：默认关闭；配齐 SAAS_OAUTH2_KEYCLOAK_CLIENT_SECRET 后设 SAAS_OAUTH2_ENABLED=true
  # 详见 application-oidc.example.yml 与 docs/runbooks/oidc-dev-setup.md
  auth:
    oauth2:
      enabled: ${SAAS_OAUTH2_ENABLED:false}
      providers:
        - id: keycloak
          display-name: Keycloak (local)
          issuer-uri: ${SAAS_OAUTH2_KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/yunyan}
          client-id: ${SAAS_OAUTH2_KEYCLOAK_CLIENT_ID:saas-local}
          client-secret: ${SAAS_OAUTH2_KEYCLOAK_CLIENT_SECRET:}
          scopes:
            - openid
            - profile
            - email
  # Phase 10-3：对象存储真实 S3 SDK（默认 local；生产设 SAAS_OBJECT_STORAGE_USE_REAL_S3=true）
  object-storage:
    provider: local
    use-real-s3: ${SAAS_OBJECT_STORAGE_USE_REAL_S3:false}
    bucket: tenant-exports
    endpoint: ${SAAS_OBJECT_STORAGE_ENDPOINT:}
    access-key: ${SAAS_OBJECT_STORAGE_ACCESS_KEY:}
    secret-key: ${SAAS_OBJECT_STORAGE_SECRET_KEY:}
    region: ${SAAS_OBJECT_STORAGE_REGION:us-east-1}
    multipart-threshold-bytes: ${SAAS_OBJECT_STORAGE_MULTIPART_THRESHOLD_BYTES:5242880}
    lifecycle-expire-days: ${SAAS_OBJECT_STORAGE_LIFECYCLE_EXPIRE_DAYS:0}
    # Phase 12-5：跨区复制与合规保留（生产按需配置）
    replication-target-bucket: ${SAAS_OBJECT_STORAGE_REPLICATION_BUCKET:}
    replication-region: ${SAAS_OBJECT_STORAGE_REPLICATION_REGION:}
    compliance-retain-days: ${SAAS_OBJECT_STORAGE_COMPLIANCE_RETAIN_DAYS:0}
    # Phase 13-5：SSE/KMS（生产按需配置）
    server-side-encryption: ${SAAS_OBJECT_STORAGE_SSE:}
    kms-key-id: ${SAAS_OBJECT_STORAGE_KMS_KEY_ID:}
  audit:
    alert-webhook-url: ${SAAS_AUDIT_ALERT_WEBHOOK_URL:}
    usage-alert-ms: ${SAAS_AUDIT_USAGE_ALERT_MS:3600000}
