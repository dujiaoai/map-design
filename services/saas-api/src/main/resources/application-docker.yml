spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/saas
    username: saas
    password: saas
  data:
    redis:
      host: redis
      port: 6379

server:
  port: 8082

saas:
  jwt:
    secret: ${SAAS_JWT_SECRET:docker-only-change-me-use-32chars-min!!}
  auth:
    password:
      strength-enabled: true
  cors:
    allowed-origins:
      - http://localhost:8084
      - http://localhost:8083
      - http://localhost:9080
