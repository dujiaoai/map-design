# OIDC 本地联调可选 profile 示例
#
# 用法（二选一）：
#   A) 复制为 application-oidc.yml（勿提交 client-secret），启动：
#        mvn -pl saas-api spring-boot:run -Dspring-boot.run.profiles=dev,oidc
#   B) 在 application-dev.yml 已预留 Keycloak 占位，仅设置环境变量：
#        SAAS_OAUTH2_ENABLED=true
#        SAAS_OAUTH2_KEYCLOAK_CLIENT_SECRET=<Keycloak client secret>
#
# 联调步骤见 docs/runbooks/oidc-dev-setup.md

saas:
  app:
    web-base-url: ${SAAS_WEB_BASE_URL:http://localhost:5175}
    admin-base-url: ${SAAS_ADMIN_BASE_URL:http://localhost:5181}
  auth:
    oauth2:
      enabled: true
      providers:
        - id: keycloak
          display-name: Keycloak (local)
          issuer-uri: ${SAAS_OAUTH2_KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/yunyan}
          client-id: ${SAAS_OAUTH2_KEYCLOAK_CLIENT_ID:saas-local}
          client-secret: ${SAAS_OAUTH2_KEYCLOAK_CLIENT_SECRET:}
          scopes:
            - openid
            - profile
            - email
