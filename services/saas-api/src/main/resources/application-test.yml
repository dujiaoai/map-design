spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
  datasource:
    url: jdbc:h2:mem:saas_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  flyway:
    enabled: true
    locations: classpath:db/migration

saas:
  jwt:
    issuer: yunyan-saas-test
    secret: test-jwt-secret-with-at-least-32-bytes!!
    access-ttl: PT15M
    refresh-ttl: P7D
