spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
  datasource:
    url: jdbc:h2:mem:saas_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  flyway:
    enabled: true
    locations: classpath:db/migration

saas:
  tenant-rls:
    enabled: false
  mail:
    enabled: false
  app:
    web-base-url: http://localhost:5175
    admin-base-url: http://localhost:5181
  invite:
    token-pepper: test-invite-pepper-with-32-bytes!!
    link-default-ttl: P7D
  password-reset:
    token-ttl: PT1H
  registration:
    token-ttl: PT24H
    allow-public-org-signup: true
    allow-public-personal-signup: true
  auth:
    password:
      strength-enabled: false
  rate-limit:
    enabled: false
  jwt:
    issuer: yunyan-saas-test
    secret: test-jwt-secret-with-at-least-32-bytes!!
    access-ttl: PT15M
    refresh-ttl: P7D
    refresh-grace-period: PT30S
    perm-epoch: 1
