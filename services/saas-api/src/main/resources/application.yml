spring:
  application:
    name: saas-api
  profiles:
    active: dev
  datasource:
    url: jdbc:postgresql://localhost:5432/saas
    username: saas
    password: saas
  flyway:
    enabled: true
    locations: classpath:db/migration,classpath:db/migration-postgresql
  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

saas:
  tenant-rls:
    enabled: true
  jwt:
    issuer: yunyan-saas
    secret: ${SAAS_JWT_SECRET:dev-only-change-me-use-32chars-minimum!!}
    access-ttl: PT15M
    refresh-ttl: P7D
  cors:
    allowed-origins:
      - http://localhost:5175

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    persist-authorization: true
    display-request-duration: true
    tags-sorter: alpha
    operations-sorter: method
    try-it-out-enabled: true
  show-actuator: false
  packages-to-scan: com.yunyan.saasapi.web.controller
