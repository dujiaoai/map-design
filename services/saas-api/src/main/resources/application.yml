spring:
  application:
    name: saas-api
  profiles:
    active: dev
  mail:
    host: ${SPRING_MAIL_HOST:localhost}
    port: ${SPRING_MAIL_PORT:1025}
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false
  datasource:
    url: jdbc:postgresql://localhost:5432/saas
    username: saas
    password: saas
  flyway:
    enabled: true
    locations: classpath:db/migration,classpath:db/migration-postgresql
  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

saas:
  tenant-rls:
    enabled: true
  mail:
    enabled: ${SAAS_MAIL_ENABLED:true}
    from: ${SAAS_MAIL_FROM:noreply@yunyan.local}
  app:
    web-base-url: ${SAAS_WEB_BASE_URL:http://localhost:5175}
    admin-base-url: ${SAAS_ADMIN_BASE_URL:http://localhost:5181}
  auth:
    password:
      strength-enabled: ${SAAS_PASSWORD_STRENGTH:false}
  invite:
    token-ttl: PT48H
    link-default-ttl: P7D
    token-pepper: ${SAAS_INVITE_TOKEN_PEPPER:dev-invite-pepper-change-me!!}
  password-reset:
    token-ttl: PT1H
  registration:
    token-ttl: PT24H
    allow-public-org-signup: ${SAAS_ALLOW_PUBLIC_ORG_SIGNUP:true}
    allow-public-personal-signup: ${SAAS_ALLOW_PUBLIC_PERSONAL_SIGNUP:true}
  rate-limit:
    enabled: true
    login:
      ip-max-attempts: 5
      ip-window: PT1M
      account-max-attempts: 5
      account-window: PT15M
    register:
      ip-max-attempts: 3
      ip-window: PT1H
      email-max-attempts: 1
      email-window: PT15M
    password-reset:
      ip-max-attempts: 3
      ip-window: PT1H
      email-max-attempts: 1
      email-window: PT15M
  billing:
    enabled: ${SAAS_BILLING_ENABLED:false}
    base-url: ${SAAS_BILLING_API_BASE_URL:http://localhost:8083}
    internal-token: ${BILLING_INTERNAL_TOKEN:dev-billing-internal-token-change-me}
    client:
      max-attempts: 3
      backoff-ms: 200
    signup-bonus-retry:
      scan-ms: 300000
      max-attempts: 20
    membership-sync:
      push-enabled: ${SAAS_BILLING_MEMBERSHIP_PUSH_ENABLED:false}
  jwt:
    issuer: yunyan-saas
    secret: ${SAAS_JWT_SECRET:dev-only-change-me-use-32chars-minimum!!}
    access-ttl: PT15M
    refresh-ttl: P7D
    refresh-grace-period: PT30S
    perm-epoch: ${SAAS_JWT_PERM_EPOCH:2}
  cors:
    allowed-origins:
      - http://localhost:5175
      - http://localhost:5181
      - http://localhost:5182

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    persist-authorization: true
    display-request-duration: true
    tags-sorter: alpha
    operations-sorter: method
    try-it-out-enabled: true
  show-actuator: false
  packages-to-scan: com.yunyan.saasapi.web.controller
