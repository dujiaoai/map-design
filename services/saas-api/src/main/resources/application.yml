spring:
  application:
    name: saas-api
  profiles:
    active: dev
  mail:
    host: ${SPRING_MAIL_HOST:localhost}
    port: ${SPRING_MAIL_PORT:1025}
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false
  datasource:
    url: jdbc:postgresql://localhost:5432/saas
    username: saas
    password: saas
  flyway:
    enabled: true
    locations: classpath:db/migration,classpath:db/migration-postgresql
  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8082

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{tenantId}/%X{userId}] [%thread] %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

saas:
  tenant-rls:
    enabled: true
  mail:
    enabled: ${SAAS_MAIL_ENABLED:true}
    from: ${SAAS_MAIL_FROM:noreply@yunyan.local}
  app:
    web-base-url: ${SAAS_WEB_BASE_URL:http://localhost:5175}
    admin-base-url: ${SAAS_ADMIN_BASE_URL:http://localhost:5181}
  auth:
    password:
      strength-enabled: ${SAAS_PASSWORD_STRENGTH:false}
    admin-mfa:
      enforcement-enabled: ${SAAS_ADMIN_MFA_ENFORCEMENT:false}
      secret-encryption-key: ${SAAS_ADMIN_MFA_SECRET_KEY:MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNDU2Nzg5MDE=}
      totp-issuer: ${SAAS_ADMIN_MFA_TOTP_ISSUER:YunYan Admin}
    oauth2:
      enabled: ${SAAS_OAUTH2_ENABLED:false}
      providers: []
  invite:
    token-ttl: PT48H
    link-default-ttl: P7D
    token-pepper: ${SAAS_INVITE_TOKEN_PEPPER:dev-invite-pepper-change-me!!}
  password-reset:
    token-ttl: PT1H
  registration:
    token-ttl: PT24H
    allow-public-org-signup: ${SAAS_ALLOW_PUBLIC_ORG_SIGNUP:true}
    allow-public-personal-signup: ${SAAS_ALLOW_PUBLIC_PERSONAL_SIGNUP:true}
  rate-limit:
    enabled: true
    login:
      ip-max-attempts: 5
      ip-window: PT1M
      account-max-attempts: 5
      account-window: PT15M
    register:
      ip-max-attempts: 3
      ip-window: PT1H
      email-max-attempts: 1
      email-window: PT15M
    password-reset:
      ip-max-attempts: 3
      ip-window: PT1H
      email-max-attempts: 1
      email-window: PT15M
    tenant-api:
      enabled: true
      window: PT1M
      plan-cache-ttl: PT5M
  billing:
    enabled: ${SAAS_BILLING_ENABLED:false}
    base-url: ${SAAS_BILLING_API_BASE_URL:http://localhost:8083}
    internal-token: ${BILLING_INTERNAL_TOKEN:dev-billing-internal-token-change-me}
    client:
      max-attempts: 3
      backoff-ms: 200
    signup-bonus-retry:
      scan-ms: 300000
      max-attempts: 20
    membership-sync:
      push-enabled: ${SAAS_BILLING_MEMBERSHIP_PUSH_ENABLED:false}
      push-retry-scan-ms: 60000
      push-retry-batch-size: 50
      push-signature-enabled: ${SAAS_BILLING_MEMBERSHIP_PUSH_SIGNATURE:false}
      push-signature-hmac-secret: ${BILLING_MEMBERSHIP_PUSH_HMAC_SECRET:}
  jwt:
    issuer: yunyan-saas
    secret: ${SAAS_JWT_SECRET:dev-only-change-me-use-32chars-minimum!!}
    access-ttl: PT15M
    refresh-ttl: P7D
    refresh-grace-period: PT30S
    perm-epoch: ${SAAS_JWT_PERM_EPOCH:2}
  cors:
    allowed-origins:
      - http://localhost:5175
      - http://localhost:5181
      - http://localhost:5182
  tenant:
    trial-expired-suspend-ms: ${SAAS_TRIAL_EXPIRED_SUSPEND_MS:3600000}
    data-export-process-ms: ${SAAS_TENANT_DATA_EXPORT_PROCESS_MS:600000}
    data-export-complete-ms: ${SAAS_TENANT_DATA_EXPORT_COMPLETE_MS:600000}
  audit:
    webhook-enabled: ${SAAS_AUDIT_WEBHOOK_ENABLED:false}
    webhook-url: ${SAAS_AUDIT_WEBHOOK_URL:}
    webhook-format: ${SAAS_AUDIT_WEBHOOK_FORMAT:jsonl}
    dead-letter-max-attempts: ${SAAS_AUDIT_DEAD_LETTER_MAX_ATTEMPTS:5}
    dead-letter-retry-interval-ms: ${SAAS_AUDIT_DEAD_LETTER_RETRY_INTERVAL_MS:300000}
    alert-webhook-url: ${SAAS_AUDIT_ALERT_WEBHOOK_URL:}
    retention-days: ${SAAS_AUDIT_RETENTION_DAYS:365}
    webhook-delivery-ms: ${SAAS_AUDIT_WEBHOOK_DELIVERY_MS:300000}
    dead-letter-retry-ms: ${SAAS_AUDIT_DEAD_LETTER_RETRY_MS:600000}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    persist-authorization: true
    display-request-duration: true
    tags-sorter: alpha
    operations-sorter: method
    try-it-out-enabled: true
  show-actuator: false
  packages-to-scan: com.yunyan.saasapi.web.controller
