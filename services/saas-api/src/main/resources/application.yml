spring:
  application:
    name: saas-api
  profiles:
    active: dev
  mail:
    host: ${SPRING_MAIL_HOST:localhost}
    port: ${SPRING_MAIL_PORT:1025}
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false
  datasource:
    url: jdbc:postgresql://localhost:5432/saas
    username: saas
    password: saas
  flyway:
    enabled: true
    locations: classpath:db/migration,classpath:db/migration-postgresql
  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

saas:
  tenant-rls:
    enabled: true
  mail:
    enabled: ${SAAS_MAIL_ENABLED:true}
    from: ${SAAS_MAIL_FROM:noreply@yunyan.local}
  app:
    web-base-url: ${SAAS_WEB_BASE_URL:http://localhost:5175}
  invite:
    token-ttl: PT48H
    token-pepper: ${SAAS_INVITE_TOKEN_PEPPER:dev-invite-pepper-change-me!!}
  jwt:
    issuer: yunyan-saas
    secret: ${SAAS_JWT_SECRET:dev-only-change-me-use-32chars-minimum!!}
    access-ttl: PT15M
    refresh-ttl: P7D
  cors:
    allowed-origins:
      - http://localhost:5175
      - http://localhost:5181
      - http://localhost:5182

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    persist-authorization: true
    display-request-duration: true
    tags-sorter: alpha
    operations-sorter: method
    try-it-out-enabled: true
  show-actuator: false
  packages-to-scan: com.yunyan.saasapi.web.controller
